[custom]
; ==========================================
; 1. 基础控制参数
; ==========================================
; 节点重命名与过滤
add_emoji=true
clash_use_new_field_name=true
overwrite_original_rules=true

; ==========================================
; 2. 自定义策略组 (Proxy Groups)
; ==========================================
; 注意：订阅转换中引入全部节点、正则筛选的格式为 [类型]筛选正则
; 带有“手动”后缀的组用于动态筛选符合正则的节点

; 核心总控组
custom_proxy_group=🚀 一键代理`select`[]🎉 自建手动`[]🛸 游戏手动`[]❤️ 良心云手动`[]🍉 下载手动`[]🇭🇰 香港手动`[]🇯🇵 日本手动`[]🇸🇬 新加坡手动`[]🇺🇸 美国手动`[]🇪🇺 欧洲手动`[]🌐 其他手动`[]DIRECT`[]REJECT

; 基础分类功能组
custom_proxy_group=🎉 自建手动`select`(?i)自建|233boy|0xda|fscarmen|suoha|argo
custom_proxy_group=💡 商店`select`[]DIRECT`[]REJECT`[]🚀 一键代理`[]🎉 自建手动`[]🛸 游戏手动`[]🍉 下载手动`[]❤️ 良心云手动`[]🇭🇰 香港手动`[]🇯🇵 日本手动`[]🇸🇬 新加坡手动`[]🇺🇸 美国手动`[]🇪🇺 欧洲手动`[]🌐 其他手动
custom_proxy_group=🛸 游戏`select`[]DIRECT`[]REJECT`[]🚀 一键代理`[]🎉 自建手动`[]🛸 游戏手动`[]🍉 下载手动`[]❤️ 良心云手动`[]🇭🇰 香港手动`[]🇯🇵 日本手动`[]🇸🇬 新加坡手动`[]🇺🇸 美国手动`[]🇪🇺 欧洲手动`[]🌐 其他手动
custom_proxy_group=🛸 游戏手动`select`(?i)八戒|IPLC|IEPL
custom_proxy_group=🍉 下载`select`[]🍉 下载手动`[]❤️ 良心云手动`[]🚀 一键代理`[]🇭🇰 香港手动`[]🇯🇵 日本手动`[]🇸🇬 新加坡手动`[]🇺🇸 美国手动`[]🇪🇺 欧洲手动`[]🌐 其他手动`[]DIRECT`[]REJECT
custom_proxy_group=🍉 下载手动`select`(?i)0[.][0-9]|倍率|自建|233boy|0xda|fscarmen|suoha|argo
custom_proxy_group=❤️ 良心云`select`[]❤️ 良心云手动`[]🍉 下载手动`[]🚀 一键代理`[]🇭🇰 香港手动`[]🇯🇵 日本手动`[]🇸🇬 新加坡手动`[]🇺🇸 美国手动`[]🇪🇺 欧洲手动`[]🌐 其他手动`[]DIRECT`[]REJECT
custom_proxy_group=❤️ 良心云手动`select`(?i)良心云|自建|233boy|0xda|fsca|argo

; 地区手动组
custom_proxy_group=🇭🇰 香港手动`select`(?i)港|HK|Hong ?Kong|HKG
custom_proxy_group=🇯🇵 日本手动`select`(?i)日|JP|Japan|东京|大阪|埼玉|泉日|川日
custom_proxy_group=🇸🇬 新加坡手动`select`(?i)新|坡|狮城|SG|Singapore
custom_proxy_group=🇺🇸 美国手动`select`(?i)美|US|States|America|洛杉矶|圣何塞|西雅图|波特兰|达拉斯
custom_proxy_group=🇪🇺 欧洲手动`select`(?i)英|法|德|意|荷|瑞|欧|UK|GB|FR|DE|IT|NL|ES|SE|EU|London|Frankfurt|Paris|Amsterdam

; 其他国家/地区组（排除上述已分类节点）
custom_proxy_group=🌐 其他手动`select`^(?!.*((?i)港|HK|日|JP|新|SG|美|US|英|法|德|意|荷|瑞|欧|EU|IPLC|IEPL|游戏|0[.][0-9]|233boy|0xda|fscar|argo|自建)).*$

; 业务分类组
custom_proxy_group=📹 YouTube`select`[]🍉 下载手动`[]🚀 一键代理`[]🇭🇰 香港手动`[]🇯🇵 日本手动`[]🇸🇬 新加坡手动`[]🇺🇸 美国手动`[]🇪🇺 欧洲手动`[]🎉 自建手动`[]DIRECT
custom_proxy_group=👨🏿‍💻 GitHub`select`[]🍉 下载手动`[]🚀 一键代理`[]🇺🇸 美国手动`[]🇪🇺 欧洲手动`[]🎉 自建手动`[]DIRECT
custom_proxy_group=📲 Telegram`select`[]🍉 下载手动`[]🚀 一键代理`[]🇸🇬 新加坡手动`[]🇭🇰 香港手动`[]🇺🇸 美国手动`[]🎉 自建手动
custom_proxy_group=🎥 NETFLIX`select`[]🍉 下载手动`[]🚀 一键代理`[]🇭🇰 香港手动`[]🇯🇵 日本手动`[]🇺🇸 美国手动`[]🎉 自建手动
custom_proxy_group=🤖 ChatGPT`select`[]🚀 一键代理`[]🇺🇸 美国手动`[]🇯🇵 日本手动`[]🇸🇬 新加坡手动`[]🇪🇺 欧洲手动`[]🌐 其他手动`[]🎉 自建手动`[]❤️ 良心云手动`[]🍉 下载手动
custom_proxy_group=🐬 OneDrive`select`[]DIRECT`[]🚀 一键代理`[]🎉 自建手动`[]🍉 下载手动
custom_proxy_group=🪟 Microsoft`select`[]DIRECT`[]🚀 一键代理`[]🎉 自建手动`[]🍉 下载手动
custom_proxy_group=💶 PayPal`select`[]DIRECT`[]🚀 一键代理`[]🎉 自建手动`[]🍉 下载手动
custom_proxy_group=🎵 TikTok`select`[]🚀 一键代理`[]🇸🇬 新加坡手动`[]🇯🇵 日本手动`[]🇭🇰 香港手动`[]🎉 自建手动`[]🍉 下载手动
custom_proxy_group=✈️ Speedtest`select`[]🚀 一键代理`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 一键代理`[]DIRECT


; ==========================================
; 3. 远程规则集与单条路由规则 (Rules)
; ==========================================
; 格式：规则类型,指标名称/URL,策略组名称[,no-resolve]
; 这里的规则集直接复用了你原配置中的 Meta 格式规则集

custom_rules=RULE-SET,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.mrs,REJECT
custom_rules=RULE-SET,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.mrs,DIRECT,no-resolve
custom_rules=RULE-SET,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs,DIRECT

