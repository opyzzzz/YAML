mixed-port: 7890
allow-lan: false
bind-address: "*"
mode: rule
log-level: warning
ipv6: true
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
sniffer:
  enable: true
  override-destination: true
  parse-pure-ip: true
  force-dns-mapping: true
  sniff:
    QUIC:
      ports: [443]
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
  force-domain:
    - "+.netflix.com"
    - "+.nflxvideo.net"
    - "+.amazonaws.com"
    - "+.media.dssott.com"
  skip-domain:
    - "+.apple.com"
    - Mijia Cloud
    - dlg.io.mi.com
    - "+.oray.com"
    - "+.sunlogin.net"
    - "+.push.apple.com"
dns:
  enable: true
  listen: "127.0.0.1:1053"
  ipv6: true
  enhanced-mode: "redir-host"
  fake-ip-filter-mode: blacklist
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.localdomain"
    - "*.example"
    - "*.invalid"
    - "*.localhost"
    - "*.test"
    - "*.local"
    - "*.home.arpa"
    - "geosite:private"
    - "geosite:category-ntp"
    - "geosite:cn"
  use-hosts: true
  use-system-hosts: true
  default-nameserver:
    - https://8.8.8.8/dns-query
    - https://1.1.1.1/dns-query
  nameserver:
    - https://dns.google/dns-query
    - https://dns.cloudflare.com/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  respect-rules: true
hosts:
  dns.alidns.com: [223.5.5.5, 223.6.6.6, 2400:3200::1, 2400:3200:baba::1]
  doh.pub: [1.12.12.12, 1.12.12.21, 120.53.53.53]
  dns.google: [8.8.8.8, 8.8.4.4, 2001:4860:4860::8888, 2001:4860:4860::8844]
  cloudflare-dns.com: [1.1.1.1, 1.0.0.1, 2606:4700:4700::1111, 2606:4700:4700::1001]

# 策略组逻辑
proxy-groups:
  # === 1. 全局核心组 ===
  - name: "🚀 一键代理"
    type: select
    proxies:
      - "🎉 自建手动"
      - "🛸 游戏手动"
      - "❤️ 良心云手动"
      - "🍉 下载手动"
      - "🇭🇰 香港手动"
      - "🇯🇵 日本手动"
      - "🇸🇬 新加坡手动"
      - "🇺🇸 美国手动"
      - "🇪🇺 欧洲手动"
      - "🌐 其他手动"
      - "DIRECT"
      - "REJECT"

  # 自建类
  - name: "🎉 自建手动"
    type: select
    include-all: true
    filter: '(?i)233boy|0xda|fscarmen|suoha|argo'

  # 商店类
  - name: "💡 商店"
    type: select
    proxies: ["DIRECT", "REJECT", "🚀 一键代理", "🎉 自建手动", "🛸 游戏手动", "🍉 下载手动", "❤️ 良心云手动", "🇭🇰 香港手动", "🇯🇵 日本手动", "🇸🇬 新加坡手动", "🇺🇸 美国手动", "🇪🇺 欧洲手动", "🌐 其他手动"]
 
  # 游戏类
  - name: "🛸 游戏"
    type: select
    proxies: ["DIRECT", "REJECT", "🚀 一键代理", "🎉 自建手动", "🛸 游戏手动", "🍉 下载手动", "❤️ 良心云手动", "🇭🇰 香港手动", "🇯🇵 日本手动", "🇸🇬 新加坡手动", "🇺🇸 美国手动", "🇪🇺 欧洲手动", "🌐 其他手动"]
  - name: "🛸 游戏手动"
    type: select
    include-all: true
    filter: '(?i)IPLC|IEPL|游戏|Game|2x'

  # 下载类
  - name: "🍉 下载"
    type: select
    proxies: ["🍉 下载手动", "❤️ 良心云手动", "🚀 一键代理", "🇭🇰 香港手动", "🇯🇵 日本手动", "🇸🇬 新加坡手动", "🇺🇸 美国手动", "🇪🇺 欧洲手动", "🌐 其他手动", "DIRECT", "REJECT"]
  - name: "🍉 下载手动"
    type: select
    include-all: true
    filter: '(?i)0[.][0-9]|倍率|下载|Down|233boy|0xda|fscarmen|suoha|argo'

  # 良心云类
  - name: "❤️ 良心云"
    type: select
    proxies: ["❤️ 良心云手动", "🍉 下载手动", "🚀 一键代理", "🇭🇰 香港手动", "🇯🇵 日本手动", "🇸🇬 新加坡手动", "🇺🇸 美国手动", "🇪🇺 欧洲手动", "🌐 其他手动", "DIRECT", "REJECT"]
  - name: "❤️ 良心云手动"
    type: select
    include-all: true
    filter: '(?i)BGP|良心|中转|解|NF|Netflix|流媒体'

  # === 3. 地区手动组 ===
  - name: "🇭🇰 香港手动"
    type: select
    include-all: true
    filter: '(?i)港|HK|Hong ?Kong|HKG'

  - name: "🇯🇵 日本手动"
