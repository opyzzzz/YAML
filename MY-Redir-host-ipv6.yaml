  - { name: "🎥 NETFLIX", type: select, proxies: [ "🍉 下载手动", "🚀 一键代理", "🇭🇰 香港手动", "🇯🇵 日本手动", "🇺🇸 美国手动", "🎉 自建手动" ] }
  - { name: "🤖 ChatGPT", type: select, proxies: [ "🚀 一键代理", "🇺🇸 美国手动", "🇯🇵 日本手动", "🇸🇬 新加坡手动", "🇪🇺 欧洲手动", "🌐 其他手动", "🎉 自建手动", "❤️ 良心云手动", "🍉 下载手动" ] }
  - { name: "🐬 OneDrive", type: select, proxies: [ "DIRECT", "🚀 一键代理", "🎉 自建手动", "🍉 下载手动" ] }
